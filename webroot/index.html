<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Sing-Box Manager</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="toast-container"></div>
  <div class="app-shell">
    <div class="topbar">
      <div class="brand">
        <!-- header removed to free vertical space -->
      </div>
      <div class="chip" id="chip-runtime">Проверка состояния…</div>
    </div>

    <div id="tab-home" class="page active">
      <div class="grid two">
        <div class="card">
          <div class="card-inner">
            <div class="status-row">
              <div class="status-main">
                <div id="st-label" class="status-label">Загрузка…</div>
                <div id="st-detail" class="status-detail">Проверка процесса и активного конфига</div>
              </div>
              <div id="main-switch" class="switch" role="button" aria-label="Переключить сервис"></div>
            </div>

            <div class="traffic-charts">
              <div class="traffic-card card">
                <div class="card-inner">
                  <div class="traffic-head">
                    <div>
                      <div class="section-title">Загрузка</div>
                    </div>
                    <div class="traffic-value" id="up-value">0 B/s</div>
                  </div>
                  <canvas id="chart-up" class="chart-canvas"></canvas>
                </div>
              </div>

              <div class="traffic-card card">
                <div class="card-inner">
                  <div class="traffic-head">
                    <div>
                      <div class="section-title">Отдача</div>
                    </div>
                    <div class="traffic-value" id="down-value">0 B/s</div>
                  </div>
                  <canvas id="chart-down" class="chart-canvas"></canvas>
                </div>
              </div>

              <div class="traffic-card card">
                <div class="card-inner">
                  <div class="traffic-head">
                    <div>
                      <div class="section-title">Соединения</div>
                    </div>
                    <div class="traffic-value" id="conn-value">0</div>
                  </div>
                  <canvas id="chart-conns" class="chart-canvas"></canvas>
                </div>
              </div>

              <div class="traffic-card card">
                <div class="card-inner">
                  <div class="traffic-head">
                    <div>
                      <div class="section-title">Память</div>
                    </div>
                    <div class="traffic-value" id="mem-value">0 B</div>
                  </div>
                  <canvas id="chart-mem" class="chart-canvas"></canvas>
                </div>
              </div>

            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="tab-logs" class="page">
      <div class="card">
        <div class="card-inner">
          <div class="card-head">
            <div>
              <h3 class="section-title">Логи</h3>
              <div class="section-subtitle">Поток логов sing-box (ClashAPI)</div>
            </div>
            <div class="toolbar">
              <select id="log-level-select" class="config-select" style="min-width:120px">
                <option value="debug">debug</option>
                <option value="info" selected>info</option>
                <option value="warn">warn</option>
                <option value="error">error</option>
              </select>
              <button class="btn btn-ghost btn-mini" id="btn-clear-logs" title="Очистить">Очистить</button>
            </div>
          </div>
          <div class="log-panel">
            <div class="logs-toolbar">
              <div style="flex:1;color:var(--muted);font-size:13px">Уровень: <strong id="logs-level-display">info</strong></div>
              <input id="logs-search" class="input" type="search" placeholder="Поиск в логах" style="min-width:160px; max-width:40%;" />
              <button id="btn-clear-search" class="btn btn-ghost btn-mini" title="Очистить поиск">✕</button>
            </div>
            <div class="logs-body" id="logs-body" aria-live="polite" aria-atomic="false">
              <!-- lines will be rendered here using a recycled pool -->
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="tab-config" class="page">
      <div class="card">
        <div class="card-inner">
          <div class="card-head">
            <div>
              <div style="display:flex; align-items:center; gap:12px">
                <span class="badge" id="cfg-summary">Конфигов: —</span>
              </div>
            </div>
            <div class="toolbar">
              <button class="btn btn-primary btn-mini" id="btn-refresh-configs" type="button" aria-label="Обновить">↻</button>
              <button class="btn btn-primary btn-mini" id="btn-open-add" type="button" title="Добавить конфиг">＋</button>
            </div>
          </div>

          <div id="config-list" class="config-list-scroll"></div>
        </div>
      </div>
      <div id="add-panel" class="add-panel" aria-hidden="true">
        <div class="add-panel-inner">
          <div class="section-subtitle" style="margin-bottom:8px">Добавить из интернета — файл проверяется sing-box перед добавлением.</div>
          <div class="grid add-grid">
            <input class="input" type="text" id="new-cfg-name" placeholder="Название (например: MyServer)" />
            <input class="input" type="url" id="new-cfg-url" placeholder="URL на .json файл" />
            <div style="display:flex; gap:8px; align-items:center;">
              <button class="btn btn-primary" id="btn-download-config" type="button">Скачать и использовать</button>
              <button class="btn btn-ghost" id="btn-cancel-add" type="button">Отмена</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="tab-bar">
    <div class="tab-bar-inner">
      <div class="tab-item active" data-tab="tab-home"><span>🏠</span><span>Статус</span></div>
      <div class="tab-item" data-tab="tab-logs"><span>📝</span><span>Логи</span></div>
      <div class="tab-item" data-tab="tab-config"><span>⚙️</span><span>Конфиги</span></div>
    </div>
  </div>

  <script src="js/app.js" defer></script>
</body>
</html>

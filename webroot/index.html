<!DOCTYPE html>
<html lang="ru" data-theme="system">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <title>Sing-Box Manager</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Roboto:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0"
    rel="stylesheet" />

  <script src="https://cdn.jsdelivr.net/npm/chart.js?v=2"></script>

  <link rel="stylesheet" href="css/styles.css">
</head>

<body>
  <div id="toast-container"></div>

  <div class="app-shell">
    <header class="topbar" style="justify-content: space-between; display: flex; width: 100%;">
      <div style="display: flex; gap: 8px; flex-wrap: wrap;">
        <div class="chip" id="chip-updater" style="cursor: pointer;"
          title="Нажмите, чтобы переключить фоновый демон обновления">
          <span class="material-symbols-rounded">sync</span>
          <span>Обновления</span>
        </div>
        <div class="chip" id="chip-stat-daemon" style="cursor: pointer;"
          title="Нажмите, чтобы переключить демон статистики">
          <span class="material-symbols-rounded">query_stats</span>
          <span>Статистика</span>
        </div>
      </div>
      <div class="chip" id="chip-runtime">
        <span class="material-symbols-rounded">pending</span>
        <span>Проверка...</span>
      </div>
    </header>

    <main>
      <!-- СТАТУС -->
      <section id="tab-home" class="page active"></section>

      <!-- ЛОГИ -->
      <section id="tab-logs" class="page"></section>

      <!-- КОНФИГИ -->
      <section id="tab-config" class="page"></section>
    </main>

    <!-- Модальное окно добавления -->
    <div id="add-panel" class="md3-dialog-backdrop">
      <div class="md3-dialog">
        <div class="dialog-header">
          <h3>Добавить конфигурацию</h3>
          <p>Укажите ссылку на .json файл конфигурации.</p>
        </div>
        <div class="dialog-content">
          <div class="md3-text-field">
            <input type="text" id="new-cfg-name" placeholder=" " />
            <label>Название (напр. MyServer)</label>
          </div>
          <div class="md3-text-field">
            <input type="url" id="new-cfg-url" placeholder=" " />
            <label>URL ссылки</label>
          </div>

          <!-- Auto update options -->
          <label class="md3-checkbox-label">
            <input type="checkbox" id="cfg-auto-update" checked>
            Автообновление
          </label>

          <div class="md3-select" id="cfg-interval-wrapper">
            <select id="cfg-update-interval">
              <option value="1">Раз в 1 час</option>
              <option value="6">Раз в 6 часов</option>
              <option value="12">Раз в 12 часов</option>
              <option value="24" selected>Раз в 24 часа</option>
            </select>
            <span class="material-symbols-rounded">arrow_drop_down</span>
          </div>

        </div>
        <div class="dialog-actions">
          <button class="md3-btn text" id="btn-cancel-add">Отмена</button>
          <button class="md3-btn filled" id="btn-download-config">Добавить</button>
        </div>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <div class="nav-item active" data-tab="tab-home">
      <div class="nav-icon-container">
        <span class="material-symbols-rounded">home</span>
      </div>
      <span class="nav-label">Статус</span>
    </div>
    <div class="nav-item" data-tab="tab-logs">
      <div class="nav-icon-container">
        <span class="material-symbols-rounded">article</span>
      </div>
      <span class="nav-label">Логи</span>
    </div>
    <div class="nav-item" data-tab="tab-config">
      <div class="nav-icon-container">
        <span class="material-symbols-rounded">settings</span>
      </div>
      <span class="nav-label">Конфиги</span>
    </div>
  </nav>

  <script src="js/app.js?v=2" type="module"></script>
</body>

</html>
